# Nginx reverse proxy for the civ app.
# Install: sudo cp config/deploy/nginx.conf /etc/nginx/sites-available/civ
#          sudo ln -s /etc/nginx/sites-available/civ /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#          sudo certbot --nginx -d civ-pitboss.duckdns.org   # adds the TLS block
upstream civ_puma {
    server unix:/run/civ/puma.sock;
}

server {
    listen 80;
    server_name civ-pitboss.duckdns.org;

    root /home/deploy/civ/public;

    # Serve precompiled assets straight from disk.
    location ~ ^/assets/ {
        expires 1y;
        add_header Cache-Control public;
        try_files $uri =404;
    }

    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_pass http://civ_puma;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
